<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>BigQuery Release Notes</title>
    <link rel='stylesheet' href='{{ url_for('static', filename='css/style.css') }}'>
</head>
<body>
    <header class="header">
        <h1>BigQuery Release Notes</h1>
        <div class="theme-switch-wrapper">
            <span class="theme-label">Light Mode</span>
            <label class="theme-switch" for="checkbox">
                <input type="checkbox" id="checkbox" />
                <div class="slider round"></div>
            </label>
        </div>
    </header>
    <div class="toolbar">
        <button id='refreshBtn'>Refresh <span class='spinner' id='spinner'></span></button>
        <button id='exportBtn'>Export to CSV</button>
    </div>
    <ul id='notesList'>
        {% for note in notes %}
        <li class='note' data-content='{{ note.content|e }}' data-title='{{ note.title|e }}' data-updated='{{ note.updated|e }}'>
            <strong>{{ note.title }}</strong> <em>{{ note.updated }}</em>
            <p class='content'>{{ note.content|safe }}</p>
            <div class="actions">
                <button class='copyBtn'>Copy</button>
                <button class='tweetBtn'>Tweet</button>
            </div>
        </li>
        {% endfor %}
    </ul>
    <script src='{{ url_for('static', filename='js/main.js') }}'></script>
</body>
</html>
